<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elevate Bootcamp — Agent Progress</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#06070f; --bg-2:#0a0c18;
  --panel:rgba(255,255,255,0.035); --panel-2:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.09); --border-2:rgba(255,255,255,0.16);
  --text:#ffffff; --muted:rgba(255,255,255,0.6); --faint:rgba(255,255,255,0.38);
  --cyan:#00FBF0; --cyan-dim:rgba(0,251,240,0.12); --cyan-glow:rgba(0,251,240,0.40);
  --amber:#FFB020; --amber-dim:rgba(255,176,32,0.14);
  --green:#00E88A;
  --radius:18px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
/* ambient background */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 45% at 50% -8%, rgba(0,251,240,.10) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 92% 8%, rgba(0,251,240,.05) 0%, transparent 55%),
    repeating-linear-gradient(125deg, rgba(255,255,255,.018) 0 1px, transparent 1px 64px);
}
.wrap{position:relative;z-index:1}

/* ── typography helpers ── */
.eyebrow{
  font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:3.5px;text-transform:uppercase;color:var(--cyan);
  display:inline-flex;align-items:center;gap:14px;
}
.eyebrow::before{content:'';width:28px;height:1.5px;background:var(--cyan);display:inline-block}
h1,h2,h3{font-family:'Poppins',sans-serif;font-weight:800;letter-spacing:-1px;line-height:1.04}
.muted{color:var(--muted)}
.faint{color:var(--faint)}

/* ── buttons ── */
.btn{
  font-family:'Montserrat',sans-serif;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  font-size:12px;border:none;cursor:pointer;border-radius:999px;
  padding:15px 30px;transition:transform .15s ease,box-shadow .25s ease,background .2s ease,border-color .2s ease;
  display:inline-flex;align-items:center;gap:9px;justify-content:center;
}
.btn-primary{background:var(--cyan);color:#04121a;box-shadow:0 0 0 rgba(0,251,240,0);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 10px 38px -8px var(--cyan-glow)}
.btn-ghost{background:transparent;color:var(--text);border:1.5px solid var(--border-2)}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-sm{padding:10px 18px;font-size:10.5px;letter-spacing:1px}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.btn-danger{background:transparent;color:#ff6b7a;border:1.5px solid rgba(255,107,122,.3)}
.btn-danger:hover{border-color:#ff6b7a;background:rgba(255,107,122,.08)}

/* ── logo ── */
.logo{font-family:'Montserrat',sans-serif;font-weight:800;letter-spacing:7px;font-size:19px;color:#fff;line-height:1}
.logo small{display:block;font-size:8px;letter-spacing:4px;color:var(--muted);font-weight:600;margin-top:4px;text-align:center}

/* ════════ AUTH SCREEN ════════ */
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 20px}
.auth-card{
  width:100%;max-width:440px;background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
  border:1px solid var(--border);border-radius:24px;padding:46px 40px 40px;
  box-shadow:0 40px 120px -40px rgba(0,251,240,.18);position:relative;overflow:hidden;
}
.auth-card::before{content:'';position:absolute;inset:0;border-radius:24px;padding:1px;
  background:linear-gradient(140deg,var(--cyan),transparent 35%);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;opacity:.35;pointer-events:none}
.auth-logo{text-align:center;margin-bottom:30px}
.auth-card h2{font-size:26px;margin-bottom:6px;text-align:center}
.auth-card .sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:30px}
.field{margin-bottom:16px}
.field label{display:block;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.field input{
  width:100%;background:rgba(0,0,0,.25);border:1.5px solid var(--border);border-radius:12px;
  padding:14px 16px;color:#fff;font-family:'Poppins';font-size:15px;transition:border-color .2s,box-shadow .2s;
}
.field input:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-dim)}
.field input::placeholder{color:var(--faint)}
#auth-screen .btn{width:100%;margin-top:8px}
.auth-toggle{text-align:center;margin-top:22px;font-size:14px;color:var(--muted)}
.auth-toggle a{color:var(--cyan);cursor:pointer;font-weight:600;text-decoration:none}
.auth-msg{font-size:13.5px;text-align:center;margin-top:16px;min-height:20px;line-height:1.5}
.auth-msg.err{color:#ff8090}
.auth-msg.ok{color:var(--green)}

/* ════════ APP SHELL ════════ */
#app{display:none}
.topbar{
  position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
  padding:18px 28px;background:rgba(6,7,15,.86);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);
}
.topbar-right{display:flex;align-items:center;gap:14px}
.who{text-align:right;line-height:1.25}
.who .name{font-weight:600;font-size:14px}
.who .role{font-family:'Montserrat';font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan)}
.container{max-width:1080px;margin:0 auto;padding:56px 28px 100px}

/* view tabs (admin) */
.viewbar{display:flex;gap:10px;margin-bottom:40px;flex-wrap:wrap}
.viewbar button{
  font-family:'Montserrat';font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
  background:var(--panel);border:1px solid var(--border);color:var(--muted);
  padding:11px 20px;border-radius:999px;cursor:pointer;transition:.2s}
.viewbar button.active{background:var(--cyan);color:#04121a;border-color:var(--cyan)}
.viewbar button:not(.active):hover{border-color:var(--border-2);color:#fff}

/* ── progress header ── */
.dash-head{margin-bottom:46px}
.dash-head h1{font-size:clamp(34px,5.5vw,54px);margin:18px 0 0}
.dash-head h1 em{font-style:normal;color:var(--cyan)}
.prog{margin-top:34px;max-width:560px}
.prog-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.prog-meta .count{font-size:14px;color:var(--muted)}
.prog-meta .count b{color:#fff;font-weight:700}
.prog-meta .pct{font-family:'Montserrat';font-weight:800;font-size:30px;color:var(--cyan)}
.prog-track{height:8px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden}
.prog-fill{height:100%;border-radius:999px;background:var(--cyan);
  box-shadow:0 0 14px var(--cyan-glow);transition:width .6s cubic-bezier(.22,1,.36,1)}

/* ── block cards ── */
.blocks{display:flex;flex-direction:column;gap:18px}
.card{
  position:relative;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:28px 26px 24px;transition:border-color .25s,transform .25s,box-shadow .25s;overflow:hidden;
}
.card:hover{border-color:var(--border-2);transform:translateY(-2px)}
.card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--faint);transition:background .3s,box-shadow .3s}
.card[data-status="in_progress"]::after{background:var(--amber);box-shadow:0 0 18px var(--amber)}
.card[data-status="complete"]::after{background:var(--cyan);box-shadow:0 0 18px var(--cyan-glow)}
.card-num{font-family:'Montserrat';font-weight:800;font-size:13px;letter-spacing:2px;color:var(--faint)}
.card h3{font-size:21px;margin:14px 0 5px}
.card .csub{font-size:12.5px;color:var(--cyan);font-weight:500;margin-bottom:14px;letter-spacing:.3px}
.card .cdesc{font-size:14px;color:var(--muted);line-height:1.66;font-weight:300}

/* status pill (read-only badge) */
.status-pill{display:inline-flex;align-items:center;gap:7px;font-family:'Montserrat';
  font-size:9.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:6px 12px;border-radius:999px;border:1px solid;}
.status-pill .dot{width:7px;height:7px;border-radius:50%}
.sp-not_started{color:var(--faint);border-color:var(--border-2)} .sp-not_started .dot{background:var(--faint)}
.sp-in_progress{color:var(--amber);border-color:rgba(255,176,32,.4);background:var(--amber-dim)} .sp-in_progress .dot{background:var(--amber)}
.sp-complete{color:var(--cyan);border-color:rgba(0,251,240,.4);background:var(--cyan-dim)} .sp-complete .dot{background:var(--cyan)}

/* status segmented control (agent self-set) */
.seg{display:flex;gap:6px;margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
.seg button{flex:1;font-family:'Montserrat';font-weight:700;font-size:9px;letter-spacing:.8px;text-transform:uppercase;
  background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--muted);
  padding:9px 4px;border-radius:9px;cursor:pointer;transition:.18s}
.seg button:hover{border-color:var(--border-2);color:#fff}
.seg button.on[data-v="not_started"]{background:rgba(255,255,255,.1);color:#fff;border-color:var(--border-2)}
.seg button.on[data-v="in_progress"]{background:var(--amber);color:#1a1200;border-color:var(--amber)}
.seg button.on[data-v="complete"]{background:var(--cyan);color:#04121a;border-color:var(--cyan)}

/* ════════ ADMIN: blocks manager ════════ */
.section-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.section-head h2{font-size:24px}
.adm-block{display:flex;align-items:flex-start;gap:18px;background:var(--panel);border:1px solid var(--border);
  border-radius:14px;padding:18px 20px;margin-bottom:12px}
.adm-block .pos{font-family:'Montserrat';font-weight:800;color:var(--cyan);font-size:15px;min-width:30px;padding-top:2px}
.adm-block .body{flex:1;min-width:0}
.adm-block .body .t{font-weight:700;font-size:16px}
.adm-block .body .s{font-size:12.5px;color:var(--cyan);margin:2px 0 5px}
.adm-block .body .d{font-size:13px;color:var(--muted);font-weight:300}
.adm-block .acts{display:flex;gap:8px;flex-shrink:0}
.empty{text-align:center;padding:60px 20px;color:var(--muted);border:1px dashed var(--border);border-radius:16px}

/* ════════ ADMIN: agents progress ════════ */
.agent-row{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px 22px;margin-bottom:14px}
.agent-row .ahead{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:14px}
.agent-row .ahead .an{font-weight:600;font-size:16px}
.agent-row .ahead .ae{font-size:12px;color:var(--faint)}
.agent-row .ahead .apct{font-family:'Montserrat';font-weight:800;font-size:20px;color:var(--cyan)}
.aname-input{background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:8px;color:#fff;
  font-family:'Poppins';font-weight:600;font-size:15px;padding:6px 11px;max-width:240px;width:100%;transition:border-color .2s,box-shadow .2s}
.aname-input:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-dim)}
.aname-input::placeholder{color:var(--faint);font-weight:400}
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.agent-cell{display:flex;align-items:center;justify-content:space-between;gap:8px;
  background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:10px;padding:9px 11px}
.agent-cell .cn{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.agent-cell select{background:#0a0c18;color:#fff;border:1px solid var(--border);border-radius:7px;
  font-family:'Poppins';font-size:11px;padding:4px 6px;cursor:pointer}
.badge-admin{font-family:'Montserrat';font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--cyan);border:1px solid rgba(0,251,240,.4);border-radius:999px;padding:3px 8px;margin-left:8px}

/* ════════ MODAL ════════ */
.modal-bg{position:fixed;inset:0;z-index:200;background:rgba(3,4,10,.78);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.on{display:flex}
.modal{width:100%;max-width:520px;background:var(--bg-2);border:1px solid var(--border-2);border-radius:20px;
  padding:34px 32px;box-shadow:0 40px 120px -30px rgba(0,0,0,.8)}
.modal h3{font-size:21px;margin-bottom:22px}
.field textarea{width:100%;background:rgba(0,0,0,.25);border:1.5px solid var(--border);border-radius:12px;
  padding:13px 15px;color:#fff;font-family:'Poppins';font-size:14px;resize:vertical;min-height:96px;line-height:1.6}
.field textarea:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-dim)}
.field-row{display:flex;gap:14px}
.field-row .field{flex:1}
.modal-acts{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}

/* toast */
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);z-index:300;
  background:var(--bg-2);border:1px solid var(--cyan);color:#fff;padding:13px 22px;border-radius:12px;
  font-size:13.5px;box-shadow:0 0 30px -6px var(--cyan-glow);opacity:0;transition:.3s;pointer-events:none}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* loading */
.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;gap:14px;color:var(--muted)}
.spinner{width:22px;height:22px;border:2.5px solid var(--border-2);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media (max-width:600px){
  .container{padding:38px 18px 80px}
  .topbar{padding:14px 18px}
  .field-row{flex-direction:column;gap:0}
  .who .name{font-size:12.5px}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <!-- ═══════════ AUTH ═══════════ -->
  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-logo"><div class="logo">ELEVATE<small>REALTY GROUP</small></div></div>
      <h2>Welcome back</h2>
      <p class="sub">Sign in to track your bootcamp progress.</p>

      <div class="field">
        <label>Email</label>
        <input id="in-email" type="email" placeholder="you@elevaterealtygroup.ca" autocomplete="email" />
      </div>
      <div class="field">
        <label>Password</label>
        <input id="in-pass" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn btn-primary" id="auth-go">Sign in</button>
      <div class="auth-msg" id="auth-msg"></div>
      <div class="auth-toggle">Accounts are set up by your team admin. Need access? Reach out to them.</div>
    </div>
  </div>

  <!-- ═══════════ APP ═══════════ -->
  <div id="app">
    <div class="topbar">
      <div class="logo">ELEVATE<small>REALTY GROUP</small></div>
      <div class="topbar-right">
        <div class="who">
          <div class="name" id="who-name">—</div>
          <div class="role" id="who-role">Agent</div>
        </div>
        <button class="btn btn-ghost btn-sm" id="signout">Sign out</button>
      </div>
    </div>

    <div class="container">
      <div class="viewbar" id="viewbar" style="display:none">
        <button data-view="agent" class="active">My progress</button>
        <button data-view="blocks">Manage blocks</button>
        <button data-view="agents">Team progress</button>
      </div>

      <div id="view-agent"></div>
      <div id="view-blocks" style="display:none"></div>
      <div id="view-agents" style="display:none"></div>
    </div>
  </div>

  <!-- block editor modal -->
  <div class="modal-bg" id="modal">
    <div class="modal">
      <h3 id="modal-title">New block</h3>
      <div class="field-row">
        <div class="field" style="flex:0 0 110px"><label>Order #</label><input id="m-pos" type="number" min="1" value="1" /></div>
        <div class="field"><label>Title</label><input id="m-title" type="text" placeholder="Week 1 — Foundations" /></div>
      </div>
      <div class="field"><label>Subtitle</label><input id="m-sub" type="text" placeholder="Get set up to work" /></div>
      <div class="field"><label>Description</label><textarea id="m-desc" placeholder="What this week covers…"></textarea></div>
      <div class="modal-acts">
        <button class="btn btn-ghost btn-sm" id="m-cancel">Cancel</button>
        <button class="btn btn-primary btn-sm" id="m-save">Save block</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ════════════════════════════════════════════════════════════
   ELEVATE BOOTCAMP — configuration
   1. Create a Supabase project, then paste its URL + anon key below.
   2. Run the SQL in elevate-bootcamp-setup.sql (Supabase → SQL Editor).
   3. In Supabase → Authentication → Providers → Email, turn OFF
      "Confirm email" so agents can log in immediately.
   4. The FIRST account that signs up automatically becomes admin.
   ════════════════════════════════════════════════════════════ */
const SUPABASE_URL      = 'https://kujxfyotbkqdccekmzui.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1anhmeW90YmtxZGNjZWttenVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMzM5MTgsImV4cCI6MjA5NzgwOTkxOH0.B-5XZ5EKG85Z1e3XhrHpukeTfOAgDHLSnFVkY_mHYbk';
// Accounts are created by an admin in the Supabase dashboard — there is no public sign-up.

/* ─────────────────────────────────────────── */
const { createClient } = window.supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const STATUSES = ['not_started','in_progress','complete'];
const STATUS_LABEL = {not_started:'Not started', in_progress:'In progress', complete:'Complete'};

const state = { user:null, profile:null, blocks:[], progress:{}, view:'agent', editingId:null };

const $ = id => document.getElementById(id);

/* ── direct REST helper (PostgREST) — all data goes through here ── */
async function rest(path, {method='GET', body=null, prefer=null}={}){
  const { data:{ session } } = await sb.auth.getSession();
  const token = session?.access_token || SUPABASE_ANON_KEY;
  const headers = {
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': `Bearer ${token}`,
    'Content-Type': 'application/json'
  };
  if (prefer) headers['Prefer'] = prefer;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method, headers, body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok){
    const t = await res.text();
    throw new Error(`${res.status}: ${t}`);
  }
  if (res.status === 204) return null;
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

function toast(msg){
  const t = $('toast'); t.textContent = msg; t.classList.add('on');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('on'), 2200);
}

/* ════════ AUTH UI (login only — accounts created in Supabase) ════════ */
function authMsg(text, kind){ const m=$('auth-msg'); m.textContent=text; m.className='auth-msg '+(kind||''); }

async function handleAuth(){
  const email = $('in-email').value.trim();
  const pass  = $('in-pass').value;
  if (!email || !pass){ authMsg('Enter your email and password.','err'); return; }
  $('auth-go').disabled = true;
  try{
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;
    // onAuthStateChange handles the rest
  }catch(e){
    authMsg(prettyAuthError(e.message), 'err');
  }finally{
    $('auth-go').disabled = false;
  }
}
function prettyAuthError(m){
  if (/invalid login/i.test(m)) return 'Email or password is incorrect. Accounts are set up by your admin.';
  if (/email not confirmed/i.test(m)) return 'This account isn\u2019t confirmed yet — ask your admin to confirm it in Supabase.';
  if (/at least 6/i.test(m)) return 'Password needs to be at least 6 characters.';
  return m;
}

/* ════════ DATA LOAD ════════ */
async function loadProfile(){
  const rows = await rest(`profiles?id=eq.${state.user.id}&select=*`);
  state.profile = rows && rows[0];
}
async function loadBlocks(){
  state.blocks = await rest('bootcamp_blocks?select=*&order=position.asc,created_at.asc') || [];
}
async function loadMyProgress(){
  const rows = await rest(`block_progress?user_id=eq.${state.user.id}&select=block_id,status`) || [];
  state.progress = {};
  rows.forEach(r => state.progress[r.block_id] = r.status);
}

/* ════════ AGENT VIEW ════════ */
function statusOf(id){ return state.progress[id] || 'not_started'; }

function renderAgent(){
  const total = state.blocks.length;
  const done = state.blocks.filter(b => statusOf(b.id)==='complete').length;
  const pct = total ? Math.round(done/total*100) : 0;
  const first = (state.profile?.full_name || '').split(' ')[0] || 'there';

  let html = `
    <div class="dash-head">
      <span class="eyebrow">Your roadmap</span>
      <h1>Welcome, ${esc(first)}. <em>Here's your bootcamp.</em></h1>
      <div class="prog">
        <div class="prog-meta">
          <span class="count"><b>${done}</b> of <b>${total}</b> weeks complete</span>
          <span class="pct">${pct}%</span>
        </div>
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;

  if (!total){
    html += `<div class="empty">No bootcamp blocks yet.${state.profile?.is_admin?' Head to <b>Manage blocks</b> to add the first one.':' Check back soon.'}</div>`;
    $('view-agent').innerHTML = html; return;
  }

  html += '<div class="blocks">';
  state.blocks.forEach((b,i)=>{
    const st = statusOf(b.id);
    html += `
      <div class="card" data-status="${st}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
          <span class="card-num">${String(b.position||i+1).padStart(2,'0')}</span>
          ${statusPill(st)}
        </div>
        <h3>${esc(b.title)}</h3>
        ${b.subtitle?`<div class="csub">${esc(b.subtitle)}</div>`:''}
        ${b.description?`<div class="cdesc">${esc(b.description)}</div>`:''}
        <div class="seg" data-block="${b.id}">
          ${STATUSES.map(v=>`<button data-v="${v}" class="${v===st?'on':''}">${STATUS_LABEL[v]}</button>`).join('')}
        </div>
      </div>`;
  });
  html += '</div>';
  $('view-agent').innerHTML = html;

  document.querySelectorAll('#view-agent .seg').forEach(seg=>{
    const bid = seg.dataset.block;
    seg.querySelectorAll('button').forEach(btn=>{
      btn.onclick = ()=> setMyStatus(bid, btn.dataset.v);
    });
  });
}

function statusPill(st){
  return `<span class="status-pill sp-${st}"><span class="dot"></span>${STATUS_LABEL[st]}</span>`;
}

async function setMyStatus(blockId, status){
  const prev = state.progress[blockId];
  state.progress[blockId] = status;   // optimistic
  renderAgent();
  try{
    await rest('block_progress?on_conflict=user_id,block_id', {
      method:'POST',
      prefer:'resolution=merge-duplicates,return=minimal',
      body:[{ user_id: state.user.id, block_id: blockId, status, updated_at: new Date().toISOString() }]
    });
  }catch(e){
    state.progress[blockId] = prev; renderAgent();
    toast('Couldn\u2019t save — try again.');
    console.error(e);
  }
}

/* ════════ ADMIN: BLOCKS ════════ */
function renderBlocks(){
  let html = `
    <div class="section-head">
      <div><span class="eyebrow">Shared content</span><h2 style="margin-top:14px">Bootcamp blocks</h2></div>
      <button class="btn btn-primary btn-sm" id="add-block">+ Add block</button>
    </div>
    <p class="muted" style="font-size:13.5px;margin:-8px 0 26px;max-width:560px">
      These are the same for every agent. Editing a block updates it for the whole team — only each agent's status is personal.
    </p>`;

  if (!state.blocks.length){
    html += `<div class="empty">No blocks yet. Click <b>+ Add block</b> to create the first week.</div>`;
  } else {
    state.blocks.forEach((b,i)=>{
      html += `
        <div class="adm-block">
          <div class="pos">${String(b.position||i+1).padStart(2,'0')}</div>
          <div class="body">
            <div class="t">${esc(b.title)}</div>
            ${b.subtitle?`<div class="s">${esc(b.subtitle)}</div>`:''}
            ${b.description?`<div class="d">${esc(b.description)}</div>`:''}
          </div>
          <div class="acts">
            <button class="btn btn-ghost btn-sm" data-edit="${b.id}">Edit</button>
            <button class="btn btn-danger btn-sm" data-del="${b.id}">Delete</button>
          </div>
        </div>`;
    });
  }
  $('view-blocks').innerHTML = html;
  const add = $('add-block'); if (add) add.onclick = ()=>openModal(null);
  document.querySelectorAll('[data-edit]').forEach(b=> b.onclick=()=>openModal(b.dataset.edit));
  document.querySelectorAll('[data-del]').forEach(b=> b.onclick=()=>delBlock(b.dataset.del));
}

function openModal(id){
  state.editingId = id;
  const b = id ? state.blocks.find(x=>x.id===id) : null;
  $('modal-title').textContent = id ? 'Edit block' : 'New block';
  $('m-pos').value   = b ? (b.position||1) : (state.blocks.length+1);
  $('m-title').value = b ? b.title : '';
  $('m-sub').value   = b ? (b.subtitle||'') : '';
  $('m-desc').value  = b ? (b.description||'') : '';
  $('modal').classList.add('on');
  setTimeout(()=>$('m-title').focus(), 60);
}
function closeModal(){ $('modal').classList.remove('on'); state.editingId=null; }

async function saveBlock(){
  const payload = {
    position: parseInt($('m-pos').value)||1,
    title: $('m-title').value.trim(),
    subtitle: $('m-sub').value.trim(),
    description: $('m-desc').value.trim()
  };
  if (!payload.title){ toast('Add a title first.'); return; }
  $('m-save').disabled = true;
  try{
    if (state.editingId){
      payload.updated_at = new Date().toISOString();
      await rest(`bootcamp_blocks?id=eq.${state.editingId}`, { method:'PATCH', prefer:'return=minimal', body:payload });
      toast('Block updated.');
    } else {
      await rest('bootcamp_blocks', { method:'POST', prefer:'return=minimal', body:[payload] });
      toast('Block added.');
    }
    closeModal();
    await loadBlocks(); renderBlocks(); renderAgent();
  }catch(e){ toast('Save failed.'); console.error(e); }
  finally{ $('m-save').disabled=false; }
}

async function delBlock(id){
  const b = state.blocks.find(x=>x.id===id);
  if (!confirm(`Delete "${b?.title}"? This removes it for every agent and can't be undone.`)) return;
  try{
    await rest(`bootcamp_blocks?id=eq.${id}`, { method:'DELETE', prefer:'return=minimal' });
    toast('Block deleted.');
    await loadBlocks(); renderBlocks(); renderAgent();
  }catch(e){ toast('Delete failed.'); console.error(e); }
}

/* ════════ ADMIN: TEAM PROGRESS ════════ */
async function renderAgents(){
  $('view-agents').innerHTML = `<div class="loading"><div class="spinner"></div>Loading team…</div>`;
  let profiles=[], allProg=[];
  try{
    profiles = await rest('profiles?select=*&order=full_name.asc') || [];
    allProg  = await rest('block_progress?select=user_id,block_id,status') || [];
  }catch(e){ $('view-agents').innerHTML=`<div class="empty">Couldn't load team progress.</div>`; console.error(e); return; }

  const byUser = {};
  allProg.forEach(r=>{ (byUser[r.user_id] = byUser[r.user_id] || {})[r.block_id] = r.status; });
  const total = state.blocks.length;

  let html = `<span class="eyebrow">Team overview</span><h2 style="margin:14px 0 26px">Where everyone stands</h2>`;
  if (!profiles.length){ html += `<div class="empty">No agents yet.</div>`; }

  profiles.forEach(p=>{
    const prog = byUser[p.id] || {};
    const done = state.blocks.filter(b => prog[b.id]==='complete').length;
    const pct = total ? Math.round(done/total*100) : 0;
    html += `
      <div class="agent-row">
        <div class="ahead">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px">
              <input class="aname-input" data-name-user="${p.id}" value="${esc(p.full_name||'')}" placeholder="Add name…" />
              ${p.is_admin?'<span class="badge-admin">Admin</span>':''}
            </div>
            <div class="ae">${esc(p.email||'')}</div>
          </div>
          <div class="apct">${pct}%</div>
        </div>
        <div class="agent-grid">
          ${state.blocks.map(b=>{
            const st = prog[b.id]||'not_started';
            return `<div class="agent-cell">
              <span class="cn" title="${esc(b.title)}">${esc(b.title)}</span>
              <select data-user="${p.id}" data-block="${b.id}">
                ${STATUSES.map(v=>`<option value="${v}" ${v===st?'selected':''}>${STATUS_LABEL[v]}</option>`).join('')}
              </select>
            </div>`;
          }).join('')}
        </div>
      </div>`;
  });
  $('view-agents').innerHTML = html;

  document.querySelectorAll('#view-agents select').forEach(sel=>{
    sel.onchange = ()=> adminSetStatus(sel.dataset.user, sel.dataset.block, sel.value, sel);
  });
  document.querySelectorAll('#view-agents .aname-input').forEach(inp=>{
    inp.onchange = ()=> adminSetName(inp.dataset.nameUser, inp.value, inp);
  });
}

async function adminSetName(userId, name, input){
  input.disabled = true;
  try{
    await rest(`profiles?id=eq.${userId}`, { method:'PATCH', prefer:'return=minimal', body:{ full_name:name.trim() } });
    toast('Name saved.');
    if (userId === state.user.id && state.profile){
      state.profile.full_name = name.trim();
      $('who-name').textContent = name.trim() || state.user.email;
    }
  }catch(e){ toast('Couldn\u2019t save name.'); console.error(e); }
  finally{ input.disabled=false; }
}

async function adminSetStatus(userId, blockId, status, sel){
  sel.disabled = true;
  try{
    await rest('block_progress?on_conflict=user_id,block_id', {
      method:'POST',
      prefer:'resolution=merge-duplicates,return=minimal',
      body:[{ user_id:userId, block_id:blockId, status, updated_at:new Date().toISOString() }]
    });
    toast('Updated.');
    if (userId === state.user.id){ state.progress[blockId]=status; }
  }catch(e){ toast('Update failed.'); console.error(e); }
  finally{ sel.disabled=false; }
}

/* ════════ VIEW SWITCH ════════ */
function switchView(v){
  state.view = v;
  ['agent','blocks','agents'].forEach(name=>{
    $('view-'+name).style.display = name===v ? 'block' : 'none';
  });
  document.querySelectorAll('#viewbar button').forEach(b=> b.classList.toggle('active', b.dataset.view===v));
  if (v==='agents') renderAgents();
  if (v==='blocks') renderBlocks();
  if (v==='agent')  renderAgent();
}

/* ════════ BOOT ════════ */
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function showApp(){
  $('auth-screen').style.display = 'none';
  $('app').style.display = 'block';
  await loadProfile();
  const admin = !!state.profile?.is_admin;
  $('who-name').textContent = state.profile?.full_name || state.user.email;
  $('who-role').textContent = admin ? 'Admin' : 'Agent';
  $('viewbar').style.display = admin ? 'flex' : 'none';
  await Promise.all([ loadBlocks(), loadMyProgress() ]);
  renderAgent();
  switchView('agent');
}
function showAuth(){
  $('app').style.display = 'none';
  $('auth-screen').style.display = 'flex';
  authMsg('');
  $('in-pass').value = '';
}

/* wiring */
$('auth-go').onclick = handleAuth;
$('in-pass').addEventListener('keypress', e=>{ if(e.key==='Enter') handleAuth(); });
$('signout').onclick = ()=> sb.auth.signOut();
$('m-cancel').onclick = closeModal;
$('m-save').onclick = saveBlock;
$('modal').addEventListener('click', e=>{ if(e.target.id==='modal') closeModal(); });
document.querySelectorAll('#viewbar button').forEach(b=> b.onclick=()=>switchView(b.dataset.view));

sb.auth.onAuthStateChange((_event, session)=>{
  if (session?.user){
    state.user = session.user;
    showApp().catch(e=>{ console.error(e); toast('Something went wrong loading your data.'); });
  } else {
    state.user=null; state.profile=null;
    showAuth();
  }
});
</script>
</body>
</html>
